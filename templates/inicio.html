<!DOCTYPE html>
<html>
<head>
    <title>Monitor AWS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Dashboard de Monitoreo</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>URL</th>
                <th>Estado</th>
                <th>Última Revisión</th>
            </tr>
        </thead>
        <tbody>
            {% for sitio in sitios %}
            <tr>
                <td>{{ sitio.url }}</td>
                <td>
                    <span class="badge {{ 'bg-success' if sitio.estado == 'Online' else 'bg-danger' }}">
                        {{ sitio.estado }}
                    </span>
                </td>
                <td>{{ sitio.ultima_revision }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
