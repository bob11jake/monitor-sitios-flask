<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Perfil | AWS Monitor</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='registro.css') }}">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>AWS Monitor</h2>
        <a href="/">🏠 Dashboard</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="register-card">

            <div class="register-header">
                <h1>Crear Perfil</h1>
                <p>Registra una nueva cuenta</p>
            </div>

            <form method="POST">

                <!-- Nombre -->
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>

                    <input type="text"
                           class="form-control custom-input"
                           name="nombre"
                           placeholder="Tu nombre"
                           required>
                </div>

                <!-- Correo -->
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>

                    <input type="email"
                           class="form-control custom-input"
                           name="correo"
                           placeholder="ejemplo@correo.com"
                           required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>

                    <input type="password"
                           class="form-control custom-input"
                           name="password"
                           placeholder="********"
                           required>
                </div>

                <!-- Confirmar -->
                <div class="mb-4">
                    <label class="form-label">Confirmar contraseña</label>

                    <input type="password"
                           class="form-control custom-input"
                           name="confirm_password"
                           placeholder="********"
                           required>
                </div>

                <!-- Botón -->
                <button type="submit" class="btn register-btn w-100">
                    Crear Cuenta
                </button>

            </form>

            <div class="login-link">
                ¿Ya tienes cuenta?
                <a href="/login">Iniciar sesión</a>
            </div>

        </div>

    </div>

</body>
</html>
