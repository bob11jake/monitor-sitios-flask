<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor AWS</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='home.css') }}">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>AWS Monitor</h2>

        <a href="#">🏠 Dashboard</a>
        <a href="#">🔐 Iniciar sesión</a>
        <a href="#">🚪 Cerrar sesión</a>
    </div>

    <!-- Main content -->
    <div class="main-content">

        <div class="dashboard-card">

            <div class="header">
                <h1>Dashboard de Monitoreo</h1>
                <p>Estado actual de los servicios monitoreados</p>
            </div>

            <table class="table custom-table">
                <thead>
                    <tr>
                        <th>URL</th>
                        <th>Estado</th>
                        <th>Última Revisión</th>
                    </tr>
                </thead>

                <tbody>
                    {% for sitio in sitios %}
                    <tr>
                        <td>{{ sitio.url }}</td>

                        <td>
                            <span class="badge 
                            {{ 'bg-success' if sitio.estado == 'Online' else 'bg-danger' }}">
                                {{ sitio.estado }}
                            </span>
                        </td>

                        <td>{{ sitio.ultima_revision }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
